# Builds the `bw-wez` helper for each platform, publishes checksummed +
# provenance-attested binaries to the GitHub Release, and commits the matching
# binaries back into bin/<triple>/ so the plugin can ship them with the repo
# clone (no download needed by users).
#
# This runs once the repo is on GitHub. Notes to validate on first run:
#   - The `bundle` job uses the `production` environment and pushes to the
#     default branch with a GitHub App token.
#   - Provenance attestation needs the id-token + attestations permissions below.
#   - Reproducibility goal: `cargo build --release --locked` here should match a
#     user's local build of the same tag.

name: release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read

# Node 20 is deprecated on the runners; opt the JS-based actions (checkout,
# upload/download-artifact, attest-build-provenance) into Node 24. This is the
# fix GitHub recommends in the deprecation notice and becomes the default anyway,
# so it avoids guessing per-action version bumps.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    name: build ${{ matrix.triple }}
    permissions:
      contents: write
      id-token: write
      attestations: write
    strategy:
      fail-fast: false
      matrix:
        include:
          # Both Apple targets build on the arm64 runner: x86_64 cross-compiles
          # (our deps are pure Rust, so it's clean). Intel macOS runners are
          # scarce/deprecated, so we don't rent one.
          - { runner: macos-14, triple: aarch64-apple-darwin }
          - { runner: macos-14, triple: x86_64-apple-darwin }
          # Linux (polkit) and Windows (Hello) targets land with their cuts.
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: stable
          targets: ${{ matrix.triple }}

      - name: Build (release, locked)
        working-directory: helper
        run: cargo build --release --locked --target ${{ matrix.triple }}

      - name: Stage binary + checksum
        run: |
          mkdir -p dist
          cp "helper/target/${{ matrix.triple }}/release/bw-wez" "dist/bw-wez-${{ matrix.triple }}"
          ( cd dist && shasum -a 256 "bw-wez-${{ matrix.triple }}" > "bw-wez-${{ matrix.triple }}.sha256" )

      - name: Attest build provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4
        with:
          subject-path: "dist/bw-wez-${{ matrix.triple }}"

      - name: Publish to the GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3
        with:
          files: |
            dist/bw-wez-${{ matrix.triple }}
            dist/bw-wez-${{ matrix.triple }}.sha256

      - name: Upload artifact for the bundle job
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: bw-wez-${{ matrix.triple }}
          path: "dist/bw-wez-${{ matrix.triple }}"

  bundle:
    name: commit bundled binaries
    needs: build
    permissions:
      contents: read
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1
        id: app-token
        with:
          client-id: ${{ vars.APP_CLIENT_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: usrivastava92
          repositories: bitwarden.wez
          permission-contents: write

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: main
          token: ${{ steps.app-token.outputs.token }}
          persist-credentials: true

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: artifacts

      - name: Place binaries under bin/<triple>/
        run: |
          set -euo pipefail
          for d in artifacts/bw-wez-*; do
            triple="$(basename "$d" | sed 's/^bw-wez-//')"
            mkdir -p "bin/${triple}"
            cp "$d"/* "bin/${triple}/bw-wez"
            chmod +x "bin/${triple}/bw-wez"
          done

      - name: Commit bundled binaries if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- bin/; then
            echo "bundled binaries unchanged"; exit 0
          fi
          git add bin/
          git commit -m "ci: update bundled helper binaries (${GITHUB_REF_NAME:-manual}) [skip ci]"
          git push origin HEAD:main
