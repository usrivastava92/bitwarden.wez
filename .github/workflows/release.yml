# Builds the `bw-wez` helper for each platform, publishes checksummed +
# provenance-attested binaries to the GitHub Release, and commits the matching
# binaries back into bin/<triple>/ so the plugin can ship them with the repo
# clone (no download needed by users).
#
# This runs once the repo is on GitHub. Notes to validate on first run:
#   - The `bundle` job pushes to the default branch; the repo's branch
#     protection must allow the GITHUB_TOKEN (or swap in a PAT/deploy key).
#   - Provenance attestation needs the id-token + attestations permissions below.
#   - Reproducibility goal: `cargo build --release --locked` here should match a
#     user's local build of the same tag.

name: release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write       # create releases; push bundled binaries
  id-token: write       # OIDC for build provenance
  attestations: write   # write the provenance attestation

jobs:
  build:
    name: build ${{ matrix.triple }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { runner: macos-14, triple: aarch64-apple-darwin }  # Apple Silicon
          - { runner: macos-13, triple: x86_64-apple-darwin }   # Intel
          # Linux (polkit) and Windows (Hello) targets land with their cuts.
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.triple }}

      - name: Build (release, locked)
        working-directory: helper
        run: cargo build --release --locked --target ${{ matrix.triple }}

      - name: Stage binary + checksum
        run: |
          mkdir -p "dist/${{ matrix.triple }}"
          cp "helper/target/${{ matrix.triple }}/release/bw-wez" "dist/${{ matrix.triple }}/bw-wez"
          ( cd "dist/${{ matrix.triple }}" && shasum -a 256 bw-wez > bw-wez.sha256 )

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: "dist/${{ matrix.triple }}/bw-wez"

      - name: Publish to the GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/${{ matrix.triple }}/bw-wez
            dist/${{ matrix.triple }}/bw-wez.sha256

      - name: Upload artifact for the bundle job
        uses: actions/upload-artifact@v4
        with:
          name: bw-wez-${{ matrix.triple }}
          path: "dist/${{ matrix.triple }}/bw-wez"

  bundle:
    name: commit bundled binaries
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Place binaries under bin/<triple>/
        run: |
          set -euo pipefail
          for d in artifacts/bw-wez-*; do
            triple="$(basename "$d" | sed 's/^bw-wez-//')"
            mkdir -p "bin/${triple}"
            cp "${d}/bw-wez" "bin/${triple}/bw-wez"
            chmod +x "bin/${triple}/bw-wez"
          done

      - name: Commit bundled binaries if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- bin/; then
            echo "bundled binaries unchanged"; exit 0
          fi
          git add bin/
          git commit -m "ci: update bundled helper binaries (${GITHUB_REF_NAME:-manual}) [skip ci]"
          git push
